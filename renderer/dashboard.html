<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>DASHBOARD</title>
  <link rel="stylesheet" href="./assets/styles.css">
  <style>
    /* Preserve original CSS */
    #charts-container {
      width: 100%;
      margin: 40px auto;
      overflow-x: auto;
      overflow-y: hidden;
    }
    
    /* New layout structure */
    .chart-row {
      width: 100%;
      margin-bottom: 30px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .chart-row-full {
      width: 100%;
    }
    
    .chart-row-half {
      flex: 1;
      min-width: 300px;
    }
    
    .chart-row-third {
      flex: 1;
      min-width: 280px;
    }
    
    /* Canvas styling */
    canvas {
      width: 100% !important;
      height: 420px !important;
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: block;
    }
    
    .chart-row-half canvas,
    .chart-row-third canvas {
      height: 380px !important;
    }
    
    #stats {
      display: flex;
      gap: 20px;
      margin: 20px;
      flex-wrap: wrap;
    }
    
    .stat {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 16px;
    }
    
    /* Additional stat for On The Way count */
    .stat-ontheway {
      background: #007bff;
      color: white;
      padding: 10px 50px;
      border-radius: 6px;
      font-size: 16px;
    }
    
    @media (max-width: 768px) {
      .chart-row {
        flex-direction: column;
      }
      .chart-row-half, .chart-row-third {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>LIZAZ ENTERPRISE LTD</h2>
    <a href="dashboard.html" class="active">DASHBOARD</a>
    <a href="onTheWay.html">On The Way</a>
    <a href="stock.html">STOCK</a>
    <a href="reserved.html">RESERVED</a>
    <a href="repossessed.html">REPOSSESSED</a>
    <a href="sold.html">SOLD</a>
    <a href="add_vehicle.html">ADD NEW VEHICLE</a>
    <a href="logbooks.html">LOGBOOKS</a>
    <a href="essentials.html">ESSENTIALS</a>
  </div>

  <div class="main-content">
    <header><h1>DASHBOARD</h1></header>

    <section id="stats">
      <div class="stat" id="availableCount">0 AVAILABLE</div>
      <div class="stat-ontheway" id="onthewayCount">0 ON THE WAY</div>
      <div class="stat" id="reservedCount">0 RESERVED</div>
      <div class="stat" id="repossessedCount">0 REPOSSESSED</div>
    </section>

    <div id="charts-container">
      <!-- Row 1: Full width - Available Chart -->
      <div class="chart-row chart-row-full">
        <canvas id="availableChart"></canvas>
      </div>
      
      <!-- Row 2: Reserved & Repossessed side by side -->
      <div class="chart-row">
        <div class="chart-row-half">
          <canvas id="reservedChart"></canvas>
        </div>
        <div class="chart-row-half">
          <canvas id="repossessedChart"></canvas>
        </div>
      </div>
      
      <!-- Row 3: On The Way chart on left side -->
      <div class="chart-row">
        <div class="chart-row-third">
          <canvas id="onthewayChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

  <script type="module">
    import { db, ref, onValue } from '../firebase.js';

    // DOM elements for stats
    const availableEl = document.getElementById('availableCount');
    const onthewayEl = document.getElementById('onthewayCount');
    const reservedEl = document.getElementById('reservedCount');
    const repossessedEl = document.getElementById('repossessedCount');
    
    const vehiclesRef = ref(db, 'vehicles');
    
    let availableChart;
    let onthewayChart;
    let reservedChart;
    let repossessedChart;

    // Helper function to normalize status - matches your On The Way page logic
    function getNormalizedStatus(vehicle) {
      const status = (vehicle.status || 'available').toString().trim();
      
      // Check for ON THE WAY (matches your onTheWay page)
      const statusLower = status.toLowerCase();
      if (statusLower === 'pending' || 
          statusLower === 'on the way' || 
          statusLower === 'ontheway' || 
          statusLower === 'on_the_way' ||
          status === 'ON THE WAY' ||
          statusLower.includes('pending')) {
        return 'ontheway';
      }
      // Check for reserved
      if (statusLower === 'reserved') {
        return 'reserved';
      }
      // Check for repossessed
      if (statusLower === 'repossessed') {
        return 'repossessed';
      }
      // Check for available
      if (statusLower === 'available') {
        return 'available';
      }
      
      return statusLower;
    }

    function renderStatusChart(ctx, vehiclesData, targetStatus, titleLabel, barColor) {
      const modelCount = {};
      let vehicleCount = 0;
      
      Object.values(vehiclesData).forEach(v => {
        const normalizedStatus = getNormalizedStatus(v);
        
        // Match the target status
        let shouldInclude = false;
        if (targetStatus === 'available' && normalizedStatus === 'available') shouldInclude = true;
        else if (targetStatus === 'reserved' && normalizedStatus === 'reserved') shouldInclude = true;
        else if (targetStatus === 'repossessed' && normalizedStatus === 'repossessed') shouldInclude = true;
        else if (targetStatus === 'ontheway' && normalizedStatus === 'ontheway') shouldInclude = true;
        
        if (shouldInclude) {
          vehicleCount++;
          const modelName = v.model || 'Unknown';
          const ccValue = v.cc || v.ccValue || v.engine_cc || 'N/A';
          const key = `${modelName} (${ccValue})`;
          modelCount[key] = (modelCount[key] || 0) + 1;
        }
      });
      
      const labels = Object.keys(modelCount).sort();
      const counts = labels.map(k => modelCount[k]);
      
      const maxCount = counts.length ? Math.max(...counts, 1) : 1;
      const yMax = Math.max(3, maxCount + 1);
      
      // Debug logging
      if (targetStatus === 'ontheway') {
        console.log(`=== ON THE WAY CHART ===`);
        console.log(`Total On The Way vehicles found: ${vehicleCount}`);
        console.log(`Unique models: ${labels.length}`);
      }
      
      const newChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: titleLabel,
            data: counts,
            backgroundColor: barColor,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true, position: 'top' },
            datalabels: {
              color: '#000',
              anchor: 'end',
              align: 'top',
              font: { weight: 'bold', size: 11 },
              formatter: (value) => value > 0 ? value : ''
            }
          },
          scales: {
            x: {
              title: { display: true, text: 'Model (CC)' },
              ticks: {
                autoSkip: false,
                maxRotation: 60,
                minRotation: 45,
                font: { size: 9 }
              }
            },
            y: {
              beginAtZero: true,
              title: { display: true, text: 'Number of Vehicles' },
              ticks: { stepSize: 1, precision: 0 },
              max: yMax
            }
          }
        },
        plugins: [ChartDataLabels]
      });
      return newChart;
    }
    
    onValue(vehiclesRef, (snapshot) => {
      const data = snapshot.val() || {};
      
      let availableCount = 0;
      let onthewayCount = 0;
      let reservedCount = 0;
      let repossessedCount = 0;
      
      console.log('=== ALL VEHICLES IN DATABASE ===');
      
      // Process all vehicles
      Object.values(data).forEach((v, index) => {
        const rawStatus = v.status;
        const normalized = getNormalizedStatus(v);
        console.log(`Vehicle ${index + 1}: Model=${v.model}, Status="${rawStatus}" -> Normalized: "${normalized}"`);
        
        if (normalized === 'available') availableCount++;
        else if (normalized === 'ontheway') onthewayCount++;
        else if (normalized === 'reserved') reservedCount++;
        else if (normalized === 'repossessed') repossessedCount++;
      });
      
      console.log(`=== FINAL COUNTS ===`);
      console.log(`Available: ${availableCount}`);
      console.log(`On The Way: ${onthewayCount}`);
      console.log(`Reserved: ${reservedCount}`);
      console.log(`Repossessed: ${repossessedCount}`);
      
      // Update stats panel
      availableEl.textContent = `${availableCount} AVAILABLE`;
      onthewayEl.textContent = `${onthewayCount} ON THE WAY`;
      reservedEl.textContent = `${reservedCount} RESERVED`;
      repossessedEl.textContent = `${repossessedCount} REPOSSESSED`;
      
      // Render Available Chart (Full width - first row)
      const availableCtx = document.getElementById('availableChart').getContext('2d');
      if (availableChart) availableChart.destroy();
      availableChart = renderStatusChart(availableCtx, data, 'available', 'Available Stock', '#007bff');
      
      // Render Reserved Chart (Second row - left)
      const reservedCtx = document.getElementById('reservedChart').getContext('2d');
      if (reservedChart) reservedChart.destroy();
      reservedChart = renderStatusChart(reservedCtx, data, 'reserved', 'Reserved Vehicles', '#ffc107');
      
      // Render Repossessed Chart (Second row - right)
      const repossessedCtx = document.getElementById('repossessedChart').getContext('2d');
      if (repossessedChart) repossessedChart.destroy();
      repossessedChart = renderStatusChart(repossessedCtx, data, 'repossessed', 'Repossessed Vehicles', '#dc3545');
      
      // Render On The Way Chart (Third row - left side)
      const onthewayCtx = document.getElementById('onthewayChart').getContext('2d');
      if (onthewayChart) onthewayChart.destroy();
      onthewayChart = renderStatusChart(onthewayCtx, data, 'ontheway', 'On The Way', '#28a745');
      
      const allCharts = [availableChart, reservedChart, repossessedChart, onthewayChart];
      const resizeHandler = () => {
        allCharts.forEach(ch => {
          if (ch && typeof ch.resize === 'function') ch.resize();
        });
      };
      window.removeEventListener('resize', resizeHandler);
      window.addEventListener('resize', resizeHandler);
      setTimeout(() => resizeHandler(), 100);
    });
  </script>
</body>
</html>
